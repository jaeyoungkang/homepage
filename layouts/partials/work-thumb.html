{{ $slug := path.Base .File.Dir }}
{{ if eq $slug "lighthouse" }}
<svg class="thumb thumb-svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Lighthouse vertical beams">
  <rect width="400" height="300" fill="#ffd84d" />
  <rect x="40"  y="0" width="14" height="300" fill="#1f2bff" />
  <rect x="78"  y="0" width="6"  height="300" fill="#1f2bff" />
  <rect x="100" y="0" width="22" height="300" fill="#1f2bff" />
  <rect x="138" y="0" width="4"  height="300" fill="#1f2bff" />
  <rect x="156" y="0" width="10" height="300" fill="#1f2bff" />
  <circle cx="300" cy="92" r="48" fill="#0c0c0d" />
  <circle cx="300" cy="92" r="20" fill="#ffd84d" />
  <rect x="0" y="262" width="400" height="2" fill="#0c0c0d" />
  <text x="24" y="284" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="700" fill="#0c0c0d" letter-spacing="2">LH / 001</text>
</svg>
{{ else if eq $slug "cabinet-meeting-brief" }}
<svg class="thumb thumb-svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Cabinet brief aligned lines">
  <rect width="400" height="300" fill="#1f2bff" />
  <rect x="48" y="46" width="220" height="208" fill="#f4f1ea" />
  <rect x="64"  y="70"  width="168" height="6" fill="#1f2bff" />
  <rect x="64"  y="92"  width="120" height="4" fill="#1f2bff" />
  <rect x="64"  y="106" width="188" height="4" fill="#1f2bff" />
  <rect x="64"  y="120" width="140" height="4" fill="#1f2bff" />
  <rect x="64"  y="146" width="92"  height="6" fill="#ff5b1f" />
  <rect x="64"  y="166" width="180" height="4" fill="#1f2bff" />
  <rect x="64"  y="180" width="156" height="4" fill="#1f2bff" />
  <rect x="64"  y="194" width="172" height="4" fill="#1f2bff" />
  <rect x="64"  y="220" width="60"  height="6" fill="#ff5b1f" />
  <circle cx="332" cy="86" r="34" fill="#ff5b1f" />
  <rect x="320" y="140" width="24" height="100" fill="#ff5b1f" />
  <text x="48" y="284" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="700" fill="#f4f1ea" letter-spacing="2">CMB / 002</text>
</svg>
{{ else if eq $slug "english-sense-training" }}
<svg class="thumb thumb-svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" role="img" aria-label="English sense breathing curves">
  <rect width="400" height="300" fill="#ff7ab6" />
  <path d="M -20 220 C 80 140, 160 300, 260 200 S 440 160, 440 200" stroke="#06351c" stroke-width="6" fill="none" />
  <path d="M -20 180 C 80 100, 160 260, 260 160 S 440 120, 440 160" stroke="#0c0c0d" stroke-width="3" fill="none" />
  <path d="M -20 252 C 80 180, 160 320, 260 232 S 440 200, 440 240" stroke="#06351c" stroke-width="2" fill="none" opacity="0.7" />
  <circle cx="80"  cy="80"  r="10" fill="#06351c" />
  <circle cx="220" cy="58"  r="6"  fill="#0c0c0d" />
  <circle cx="320" cy="92"  r="14" fill="#06351c" />
  <text x="24" y="40" font-family="Space Grotesk, sans-serif" font-size="36" font-weight="700" fill="#0c0c0d" letter-spacing="-1">sense.</text>
  <text x="24" y="284" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="700" fill="#0c0c0d" letter-spacing="2">EST / 003</text>
</svg>
{{ else }}
<svg class="thumb thumb-svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" role="img">
  <rect width="400" height="300" fill="#f4f1ea" />
  <rect x="40" y="40" width="320" height="220" fill="none" stroke="#0c0c0d" stroke-width="2" />
  <text x="200" y="160" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="24" font-weight="700" fill="#0c0c0d">{{ .Title }}</text>
</svg>
{{ end }}
