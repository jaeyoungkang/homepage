{{ define "main" }}
<section class="page-section">
  <div class="wrap" style="max-width: 720px;">
    <header style="margin-bottom: 2.5rem;">
      <p class="eyebrow section-eyebrow">{{ .Section | title }}</p>
      <h1 class="section-title">{{ .Title }}</h1>
    </header>

    <div class="list-rows">
      {{ range .Pages.ByDate.Reverse }}
      <a href="{{ .RelPermalink }}" class="list-row">
        <span class="list-title">{{ .Title }}</span>
        <span class="list-date">{{ .Date.Format "2006 · 01 · 02" }}</span>
      </a>
      {{ end }}
    </div>

    <p style="margin-top: 3rem;"><a class="more" href="{{ "/" | relLangURL }}">← {{ i18n "backToHome" }}</a></p>
  </div>
</section>
{{ end }}
