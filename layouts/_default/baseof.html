<!doctype html>
<html lang="{{ .Lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }} — {{ i18n "name" }} / {{ i18n "role" }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    (function () {
      try {
        var KEY = 'yc-theme';
        var saved = localStorage.getItem(KEY);
        var theme;
        if (saved === 'editorial' || saved === 'studio') {
          theme = saved;
        } else {
          theme = Math.random() < 0.5 ? 'editorial' : 'studio';
          localStorage.setItem(KEY, theme);
        }
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'editorial');
      }
    })();
  </script>
  {{ partial "posthog.html" . }}
  <link rel="stylesheet" href="{{ "/css/theme.css" | relURL }}">
</head>
<body>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script src="{{ "/js/theme-toggle.js" | relURL }}"></script>
</body>
</html>
