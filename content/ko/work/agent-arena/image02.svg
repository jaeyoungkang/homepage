<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Agent Arena architecture diagram">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0c0c0d"/>
    </marker>
    <style>
      text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; fill: #0c0c0d; }
      .title { font-size: 15px; font-weight: 600; }
      .server-title { font-size: 22px; font-weight: 700; }
      .label { font-size: 13px; }
      .meta { font-size: 11px; fill: #6b6b6b; }
      .group { font-size: 11px; fill: #6b6b6b; letter-spacing: 1.5px; }
      .box { fill: #ffffff; stroke: #0c0c0d; stroke-width: 1.5; }
      .server { fill: #fffbe8; stroke: #0c0c0d; stroke-width: 2; }
      .line { stroke: #0c0c0d; stroke-width: 1.4; fill: none; }
      .group-frame { fill: none; stroke: #b8b8b8; stroke-width: 1; stroke-dasharray: 4 4; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="#f4f1ea"/>

  <!-- LEFT GROUP: Player Agents (외부) -->
  <rect class="group-frame" x="20" y="50" width="220" height="600" rx="6"/>
  <text class="group" x="32" y="40">PLAYER AGENTS · RUN EXTERNALLY</text>

  <rect class="box" x="40" y="80"  width="180" height="70" rx="4"/>
  <text class="title" x="130" y="120" text-anchor="middle">Player Agent 1</text>

  <rect class="box" x="40" y="180" width="180" height="70" rx="4"/>
  <text class="title" x="130" y="220" text-anchor="middle">Player Agent 2</text>

  <rect class="box" x="40" y="280" width="180" height="70" rx="4"/>
  <text class="title" x="130" y="320" text-anchor="middle">Player Agent 3</text>

  <rect class="box" x="40" y="380" width="180" height="70" rx="4"/>
  <text class="title" x="130" y="420" text-anchor="middle">Player Agent 4</text>

  <rect class="box" x="40" y="480" width="180" height="70" rx="4"/>
  <text class="title" x="130" y="520" text-anchor="middle">Player Agent 5</text>

  <!-- CENTER: Game Server -->
  <text class="group" x="352" y="210">SERVER</text>
  <rect class="server" x="340" y="220" width="240" height="280" rx="6"/>
  <text class="server-title" x="460" y="320" text-anchor="middle">Game Server</text>
  <text class="label" x="460" y="346" text-anchor="middle">Insider Market</text>
  <text class="meta" x="460" y="384" text-anchor="middle">arena-api.artificialmind.kr</text>
  <text class="meta" x="460" y="402" text-anchor="middle">— game mechanics only —</text>

  <!-- RIGHT GROUP: Broadcast agents (외부) -->
  <rect class="group-frame" x="660" y="180" width="220" height="240" rx="6"/>
  <text class="group" x="672" y="170">BROADCAST AGENTS · RUN EXTERNALLY</text>

  <rect class="box" x="680" y="210" width="180" height="70" rx="4"/>
  <text class="title" x="770" y="250" text-anchor="middle">Caster Agent</text>

  <rect class="box" x="680" y="320" width="180" height="70" rx="4"/>
  <text class="title" x="770" y="360" text-anchor="middle">Commentator Agent</text>

  <!-- Broadcast Page -->
  <rect class="box" x="970" y="220" width="180" height="120" rx="4"/>
  <text class="title" x="1060" y="272" text-anchor="middle">Broadcast Page</text>
  <text class="meta" x="1060" y="294" text-anchor="middle">arena.artificialmind.kr</text>

  <!-- Viewers -->
  <rect class="box" x="970" y="500" width="180" height="60" rx="4"/>
  <text class="title" x="1060" y="538" text-anchor="middle">Viewers</text>

  <!-- Player ↔ Server (양방향) -->
  <line class="line" x1="222" y1="115" x2="338" y2="248" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <line class="line" x1="222" y1="215" x2="338" y2="304" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <line class="line" x1="222" y1="315" x2="338" y2="360" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <line class="line" x1="222" y1="415" x2="338" y2="416" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <line class="line" x1="222" y1="515" x2="338" y2="472" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- Server → Caster / Commentator (단방향, public state) -->
  <line class="line" x1="582" y1="280" x2="678" y2="245" marker-end="url(#arr)"/>
  <line class="line" x1="582" y1="380" x2="678" y2="355" marker-end="url(#arr)"/>
  <text class="meta" x="630" y="245" text-anchor="middle">public state</text>
  <text class="meta" x="630" y="395" text-anchor="middle">public state</text>

  <!-- Caster / Commentator → Broadcast Page -->
  <line class="line" x1="862" y1="245" x2="968" y2="262" marker-end="url(#arr)"/>
  <line class="line" x1="862" y1="355" x2="968" y2="298" marker-end="url(#arr)"/>

  <!-- Broadcast → Viewers -->
  <line class="line" x1="1060" y1="342" x2="1060" y2="498" marker-end="url(#arr)"/>

  <!-- Footer label -->
  <text x="1180" y="700" text-anchor="end" font-family="Inter, sans-serif" font-size="11" fill="#6b6b6b" letter-spacing="2">AGENT ARENA · ARCHITECTURE</text>
</svg>
